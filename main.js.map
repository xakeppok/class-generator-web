<div class="tab-1 mt-20">
  <mat-form-field>
    <input matInput [formControl]="className" placeholder="Enter class name" />
  </mat-form-field>
  <mat-checkbox color="primary" [formControl]="needFromJson"
    >Need from json</mat-checkbox
  >
  <mat-checkbox color="primary" [formControl]="needCopyWith"
    >Need copy with</mat-checkbox
  >
  <mat-checkbox color="primary" [formControl]="needToJson"
    >Need to json</mat-checkbox
  >
  <button mat-raised-button (click)="addField()" color="primary">
    Add field
  </button>
  <div>
    <mat-checkbox color="primary" [formControl]="fromJsonString"
      >From json string</mat-checkbox
    >
    <div>
      <mat-form-field style="width: 500px" *ngIf="fromJsonString.value">
        <textarea
          style="min-height: 100px"
          matInput
          [formControl]="json"
          placeholder="Enter json"
        ></textarea>
        <div style="color: red" *ngIf="error !== ''">{{ error }}</div>
      </mat-form-field>
    </div>
  </div>
  <div *ngFor="let field of fields.controls; let i = index">
    <app-field
      [field]="field | transormToFormGroup"
      (removeItem)="removeItem(i)"
      (addEnum)="addEnum($event)"
      (removeEnum)="removeEnum($event)"
      (changeType)="changeIsList(i)"
    ></app-field>
  </div>
  <div>class {{ className.value }} {{ "{" }}</div>
  <div class="tab-1">{{ getClassConstructor() }}</div>
  <div class="tab-1" *ngFor="let field of fields.controls">
    {{ getField(field) }};
  </div>
  <app-from-to-enum
    *ngIf="needFromJson.value || needToJson.value"
    [fields]="fields"
  ></app-from-to-enum>

  <app-from-json
    *ngIf="needFromJson.value"
    [fields]="fields"
    [className]="className.value"
  ></app-from-json>
  <app-to-json
    *ngIf="needToJson.value"
    [fields]="fields"
    [className]="className.value"
  ></app-to-json>

  <app-copy-with
    *ngIf="needCopyWith.value"
    [fields]="fields"
    [className]="className.value"
  ></app-copy-with>
  <div>{{ "}" }}</div>
  <app-enum [fields]="fields" [className]="className.value"></app-enum>
</div>
