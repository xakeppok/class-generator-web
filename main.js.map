<div>
  <br />
  <div class="tab-1">
    static {{ className | firstLetterUppercase }}
    {{ "fromJson(Map\<\String, dynamic> json){" }}
  </div>
  <div class="tab-2">if (json == null) {{ "{" }}</div>
  <div class="tab-3">return null;</div>
  <div class="tab-2">{{ "}" }}</div>
  <div class="tab-2">
    return
    {{ className | firstLetterUppercase }}{{ "(" }}
  </div>
  <div class="tab-3" *ngFor="let item of fields.controls; let i = index">
    {{ getFromJson(item) }}{{ comma(i) }}
  </div>
  <div class="tab-2">);</div>
  <div class="tab-1">{{ "}" }}</div>
</div>
