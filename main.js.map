<div [formGroup]="field | transormToFormGroup">
  <div class="column">
    <div class="row">
      <mat-form-field>
        <mat-label>Choose type</mat-label>
        <mat-select formControlName="type">
          <mat-option *ngFor="let method of types" [value]="method">
            {{ method }}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-checkbox
        *ngIf="field.get('type')?.value !== 'enum'"
        color="primary"
        formControlName="isList"
        >Is List
      </mat-checkbox>
      <mat-form-field
        *ngIf="
          field.get('type')?.value === 'custom' ||
          field.get('type')?.value === 'enum'
        "
      >
        <input
          matInput
          formControlName="modelName"
          placeholder="Enter model name"
        />
      </mat-form-field>
      <mat-form-field>
        <input matInput formControlName="property" placeholder="Enter type" />
      </mat-form-field>
      <mat-icon
        class="delete-icon"
        color="primary"
        (click)="removeItem.emit()"
        aria-hidden="false"
        >delete</mat-icon
      >
    </div>
    <div class="row">
      <div *ngIf="field.get('type')?.value === 'enum'">
        <button mat-raised-button (click)="addEnum.emit(field)" color="primary">
          Add enum field
        </button>
        <div
          class="mt-20"
          *ngFor="
            let enumItem of field | transormToFormGroup: 'enumValues';
            let enumI = index
          "
        >
          <div [formGroup]="enumItem | transormToFormGroup">
            <mat-form-field>
              <input matInput formControlName="name" placeholder="Enter name" />
            </mat-form-field>
            <mat-form-field>
              <input matInput formControlName="json" placeholder="Enter json" />
            </mat-form-field>
            <mat-icon
              class="delete-icon"
              color="primary"
              (click)="removeEnum.emit({ field: field, index: enumI })"
              aria-hidden="false"
              >delete</mat-icon
            >
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
