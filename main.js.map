<div>
  <br />
  <div class="tab-1">{{ className }} copyWith (</div>
  <div class="tab-2" *ngFor="let field of fields.controls; let i = index">
    {{ getField(field) }}{{ comma(i) }}
  </div>
  <div class="tab-1">)=>{{ className | firstLetterUppercase }}(</div>
  <div class="tab-2" *ngFor="let field of fields.controls; let i = index">
    {{ getCopyWithField(field) }}{{ comma(i) }}
  </div>
  <div class="tab-1">);</div>
</div>
